<ng2-toasty [position]="'top-right'"></ng2-toasty>
<div class="font-poppins">
<!-- Default view: show promo-code table -->
<nz-card *ngIf="!orgFormVisible" [@slideIn]>
    <!-- Actions -->
    <div nz-row nzGutter="16" style="margin-bottom: 25px;">
        <div nz-col class="gutter-row d-flex" nzSpan="7">
            <nz-input-group [nzPrefix]="prefixTemplate" [nzSuffix]="suffixTemplate">
                <input nz-input placeholder="Press enter to search." [(ngModel)]="searchBoxValue"
                    (keyup.enter)="onKeyUp()" ng-model-options="{ debounce: 1000 }" #searchBox nzSize="small">
            </nz-input-group>
            <ng-template #prefixTemplate>
                <i nz-icon nzType="search" title="Search" class="cursor-pointer" theme="outline"
                    (click)="onKeyUp()"></i>
            </ng-template>
            <ng-template #suffixTemplate>
                <span style="color: #a1887c;font-size: 12px;text-decoration: underline;cursor: pointer;background-color: #ffffff;"
                    (click)="resetSearch()">
                    Reset
                </span>
            </ng-template>
        </div>
        <div nz-col class="gutter-row d-flex text-right" nzSpan="9">
            
        </div>
        <div nz-col class="gutter-row d-flex text-right" nzSpan="5">
            <nz-input-group class="org-parent" [nzSuffix]="suffixTemplateOrg">
            <nz-select class="ellipsis-select" nzPlaceHolder="Select Organisation"  (ngModelChange)="changeOrganisation($event)"
                 [(ngModel)]="selectedOrganisation" nzSize="small" style="width: 100%;">
               
                
                <nz-option *ngFor="let org of orgFilterList" [nzValue]="org.OrganisationLocationId" [nzLabel]="org.Name">
                </nz-option>
            </nz-select>
            <ng-template #suffixTemplateOrg
                                ><i
                                  nz-icon
                                  nz-tooltip
                                  class="ant-input-clear-icon"
                                  nzTheme="fill"
                                  nzType="close-circle"
                                  *ngIf="selectedOrganisation"
                                  (click)="clearSelectedOrg(i)"
                                ></i
                              ></ng-template>
                            </nz-input-group>
        </div>
        <div nz-col class="gutter-row d-flex text-right" nzSpan="1">
            
        </div>
        <div nz-col class="gutter-row" nzSpan="2" style="text-align: right">
            <button nz-button="" nztype=" primary" class="font-small-caps btn-custom-light" title="Delete"
                *ngIf="anyChecked" nz-wave="[object Object]" nz-popconfirm
                nzPopconfirmTitle="Are you sure delete this admin?" (nzOnConfirm)="deleteOrganisation(null, true)"
                nzPopconfirmPlacement="topRight" style="margin-right: 10px;">
                <img src="assets/images/icons/delete.png" class="deleted-icon-button" />
            </button>
            <button nz-button="" nztype=" primary" (click)="openAdminForm()" class="font-small-caps  btn-fill"
                nz-wave="[object Object]"><i class="fa fa-plus button-plus-icon "
                    aria-hidden="true"></i>&nbsp;New</button>
        </div>
        
    </div>
    <div nz-row nzGutter="16">
        <div nz-col class="gutter-row" nzSpan='24'>
            <nz-table [nzLoading]="isLoading" [nzTemplateMode]="true">
                <thead (nzSortChange)="sortList($event)" nzSingleSort>
                    <tr>
                        <!-- <th nzShowCheckbox [(nzChecked)]="allChecked" (nzCheckedChange)="checkAll($event)"></th> -->
                        <th class="font-9 font-small-caps">Name</th>
                        <th class="font-9 font-small-caps">Email</th>
                        <th class="font-9 font-small-caps">Contact</th>
                        <th class="font-9 font-small-caps">Organisation</th>
                        <th nzWidth="10%"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let data of orgAdminData" class="data-row">
                        <!-- <td nzShowCheckbox [(nzChecked)]="data.checked" (nzCheckedChange)="refreshStatus()"></td> -->
                        <td class="font-9">
                            {{data.Name}}
                        </td>
                        <td class="font-9">
                            {{data.Email}}
                        </td>
                        <td class="font-9">
                            {{data.Contact}}
                        </td>
                        <td class="font-9">
                            {{data.OrganisationName
                            }}
                        </td>
                        <td class="font-9">
                            <span class="data-row-action">
                                <img src="assets/images/icons/edit-dark.png" class="editIconTable" title="Edit"
                                     (click)="fillEditForm(data)" />
                                <img src="assets/images/icons/delete.png" class="editIconTable" title="Delete"
                                    nz-popconfirm nzPopconfirmTitle="Are you sure you want to delete this admin?"
                                    (nzOnConfirm)="deleteAdmin(data.AdminId)" nzPopconfirmPlacement="topRight" />
                                    <fa-icon [icon]="faUnlock" style="color:#a1887c" title="Reset Password"
                                    nz-popconfirm nzPopconfirmTitle="Are you sure you want to reset password? A new password will be sent to you on this email."
                                    (nzOnConfirm)="resetPassword(data.AdminId)" nzPopconfirmPlacement="topRight"></fa-icon>
                            </span>
                        </td>
                    </tr>
                </tbody>
            </nz-table>

            <div *ngIf="orgAdminData?.length && !searchBoxValue && adminTable.pagination" class="m-t-12" style="text-align: right;">
                <nz-pagination [(nzPageIndex)]="adminTable.pagination.curPage" [nzTotal]="adminTable.pagination.itemCount"
                    (nzPageIndexChange)="changePageNumber($event)" (nzPageSizeChange)="changePageSize($event)"
                    [nzPageSizeOptions]="adminTablePageSizeOptions" nzShowSizeChanger></nz-pagination>
            </div>
            <div *ngIf="!orgAdminData?.length && !isLoading">
                <nz-list [nzDataSource]="[]"></nz-list>
            </div>
        </div>
    </div>
</nz-card>

<nz-card *ngIf="orgFormVisible" >
    <div nz-row nzGutter="16">
        <div nz-col class="gutter-row" nzSpan="24" style="text-align: right;width:100%;height:20px">
            <a title="Cancel" (click)="closeOrgForm()" style="float: right;margin-bottom: 20px; color: #a1887c"><i
                    nz-icon nzType="close" theme="outline"></i></a>
        </div>
    </div>
    <!-- General details -->
    <form [formGroup]="organisationForm" _ngcontent-jfp-c14="" novalidate="" nz-form=""
        class="ant-form ng-untouched ng-invalid ng-dirty ant-form-horizontal p-l-20 organisationform">
        <div nz-row nzGutter="16">
            <div nz-col class="gutter-row" nzSpan="24">
                <nz-form-item class="ant-form-item ant-row">
                    <div nz-row nzGutter="16">
                        <div nz-col class="gutter-row" nzSpan="7">
                            <nz-form-label _ngcontent-jfp-c14="" class="ant-form-item-label">
                                <label>Name
                                    <span style="color: #f25865;">
                                        *
                                    </span>
                                </label>
                                
                            </nz-form-label>
                        </div>
                        <div nz-col class="gutter-row" nzSpan="1"></div>
                        <div nz-col class="gutter-row" nzSpan="7">
                            <nz-form-label _ngcontent-jfp-c14="" class="ant-form-item-label">
                                <label>Email
                                    <span style="color: #f25865;">
                                        *
                                    </span>
                                </label>
                            </nz-form-label>
                        </div>
                        <div nz-col class="gutter-row" nzSpan="1"></div>
                    </div>
                    <div nz-row nzGutter="16">
                        <div nz-col class="gutter-row" nzSpan="7">
                            <nz-form-control _ngcontent-jfp-c14=""
                                class="ng-tns-c16-67 ant-form-item-control-wrapper ng-star-inserted ant-col-24">
                                <div class="ant-form-item-control">
                                    <span class="ant-form-item-children">
                                        <input _ngcontent-jfp-c14="" nz-input="" formControlName="Name"
                                            placeholder="Name" style="padding: 0.45rem 0.6rem;"
                                            class="ant-input ng-untouched ng-pristine ng-invalid">
                                        <span class="ant-form-item-children-icon">
                                        </span>
                                    </span>
                                </div>
                            </nz-form-control>
                        </div>
                        <div nz-col class="gutter-row" nzSpan="1"></div>
                        <div nz-col class="gutter-row" nzSpan="7">
                            <nz-form-control _ngcontent-jfp-c14=""
                                class="ng-tns-c16-67 ant-form-item-control-wrapper ng-star-inserted ant-col-24">
                                <div class="ant-form-item-control">
                                    <span class="ant-form-item-children">
                                        <input _ngcontent-jfp-c14="" type="email" nz-input=""
                                            formControlName="Email" 
                                            class="ant-input ng-untouched ng-pristine ng-invalid">
                                       
                                        <span class="ant-form-item-children-icon"></span>
                                    </span>
                                </div>
                            </nz-form-control>
                        </div>
                        <div nz-col class="gutter-row" nzSpan="1"></div>
                    </div>
                </nz-form-item>
            </div>
        </div>
        <div nz-row nzGutter="16">
            <div nz-col class="gutter-row" nzSpan="24">
                <nz-form-item class="ant-form-item ant-row">
                    <div nz-row nzGutter="16">
                        <div nz-col class="gutter-row" nzSpan="7">
                            <nz-form-label _ngcontent-jfp-c14="" class="ant-form-item-label">
                                <label>Contact
                                    <span style="color: #f25865;">
                                        *
                                    </span>
                                </label>
                                
                            </nz-form-label>
                        </div>
                        <div nz-col class="gutter-row" nzSpan="1"></div>
                        <div nz-col class="gutter-row" nzSpan="7">
                            <nz-form-label _ngcontent-jfp-c14="" class="ant-form-item-label">
                                <label>Organisation
                                    <span style="color: #f25865;">
                                        *
                                    </span>
                                </label>
                            </nz-form-label>
                        </div>
                        <div nz-col class="gutter-row" nzSpan="1"></div>
                    </div>
                    <div nz-row nzGutter="16">
                        <div nz-col class="gutter-row" nzSpan="7">
                            <nz-form-control _ngcontent-jfp-c14=""
                                class="ng-tns-c16-67 ant-form-item-control-wrapper ng-star-inserted ant-col-24">
                                <div class="ant-form-item-control">
                                    <span class="ant-form-item-children">
                                        <input _ngcontent-jfp-c14="" nz-input="" formControlName="Contact"
                                            placeholder="Contact" style="padding: 0.45rem 0.6rem;"
                                            class="ant-input ng-untouched ng-pristine ng-invalid">
                                        <span class="ant-form-item-children-icon">
                                        </span>
                                    </span>
                                </div>
                            </nz-form-control>
                        </div>
                        <div nz-col class="gutter-row" nzSpan="1"></div>
                        <div nz-col class="gutter-row" nzSpan="7">
                            <nz-form-control _ngcontent-jfp-c14=""
                                class="ng-tns-c16-67 ant-form-item-control-wrapper ng-star-inserted ant-col-24">
                                <div class="ant-form-item-control">
                                    <span class="ant-form-item-children">
                                        <nz-select nzShowSearch nzAllowClear class="ant-col-30 m-r-10"
                                        formControlName="OrganisationLocationId" nzPlaceHolder="Select Organisation"
                                        nzTitle="Select Organisations">
                                        <nz-option *ngFor="let org of orgFilterList" [nzValue]="org.OrganisationLocationId" [nzLabel]="org.Name">
                                        </nz-option>
                                    </nz-select>
                                       
                                        <span class="ant-form-item-children-icon"></span>
                                    </span>
                                </div>
                            </nz-form-control>
                        </div>
                        <div nz-col class="gutter-row" nzSpan="1"></div>
                    </div>
                </nz-form-item>
            </div>
        </div>
        <div nz-row nzGutter="16">
            <div nz-col class="gutter-row" nzSpan="24">
                <nz-form-item>
                    <div nz-row nzGutter="16">
                        <div nz-col class="gutter-row" nzSpan="7">
                            <nz-form-label _ngcontent-jfp-c14="" class="ant-form-item-label">
                                <label class="f-700">Profile Picture</label>
                            </nz-form-label>
                        </div>
                        <div nz-col class="gutter-row" nzSpan="1"></div>
                        
                    </div>
                    <div nz-row nzGutter="16">
                        <div nz-col class="gutter-row" nzSpan="4">
                            <nz-form-control _ngcontent-jfp-c14=""
                                class="ng-tns-c16-67 ant-form-item-control-wrapper ng-star-inserted ant-col-24">
                                <div class="ant-form-item-control">
                                    <span class="ant-form-item-children">
                                        <button _ngcontent-jfp-c14="" (click)="compressProfileImage()" nz-button="" nztype="default"
                                            class="ant-btn ant-btn-default m-r-15" nz-wave="[object Object]">
                                            <span><i nz-icon nzType="upload"></i> Click to Upload</span>
                                        </button>
                                        <!-- <nz-upload nzAccept="image/*" [nzBeforeUpload]="beforeUpload">
                                            <button nz-button><i nz-icon nzType="upload"></i>Click to Upload</button>
                                        </nz-upload> -->
                                        <span class="ant-form-item-children-icon">
                                        </span>
                                    </span>
                                </div>
                            </nz-form-control>
                        </div>
                        <div nz-col class="gutter-row" nzSpan="2" *ngIf="profileImageCompressing">
                            <ng-template #indicatorTemplate><i nz-icon nzType="loading" class="color-brand-primary"></i>
                            </ng-template>
                            <nz-spin nzSimple [nzSpinning]="profileImageCompressing" style="position: relative;top:9px"
                                [nzIndicator]="indicatorTemplate">
                                <div class="img-uploading-div">
                                    &nbsp;
                                </div>
                            </nz-spin>
                        </div>
                        <div nz-col class="gutter-row" nzSpan="2" *ngIf="profileImageUploaded">
                            <div *ngIf="uploadedProfImgUrl" class="img-thumb-div">
                                <img [src]="uploadedProfImgUrl" class="img-thumb" style="cursor: pointer;height: 40px;width: 35px;"
                                    (click)="showImageModal(uploadedProfImgUrl)" />
                            </div>
                        </div> 
                    </div>
                </nz-form-item>
            </div>
        </div>
    </form>

    <!-- Form footer with action buttons -->
    <nz-divider></nz-divider>
    <div nz-row nzGutter="16">
        <div nz-col class="gutter-row" nzSpan="12">
            <button _ngcontent-jfp-c14="" (click)="updateMode ? resetUpdateForm(organisationAdminDataRaw) : resetOrganisationForm()" nz-button=""
                nztype="default" class="ant-btn ant-btn-default m-l-20 btn-outline" nz-wave="[object Object]">
                <span>Reset</span></button>
        </div>
        <div nz-col class="gutter-row" nzSpan="12" style="text-align: right;">
            <button _ngcontent-jfp-c14="" (click)="closeOrgForm()" nz-button="" nztype="default"
                class="ant-btn ant-btn-default m-r-15 btn-outline" nz-wave="[object Object]">
                <span>Cancel</span></button>
            <button _ngcontent-jfp-c14="" (click)="updateMode ? updateAdmin() : saveAdminData()" nz-button=""
                nztype="default" [disabled]="disableSubmit()" class="ant-btn btn-fill ant-btn-primary" nz-wave="[object Object]">
                <span *ngIf="updateMode">Update</span>
                <span *ngIf="!updateMode">Submit</span>
            </button>
        </div>
    </div>
</nz-card>
<nz-modal [nzVisible]="imageModel" [nzContent]="modalContent" [nzFooter]="null" (nzOnCancel)="hideImageModal()"
    [nzBodyStyle]="imageModalStyle" [nzStyle]="{ top: '20px' }">
    <ng-template #modalContent>
        <img [src]="imgUrl" class="modalImage" />
    </ng-template>
</nz-modal>
<nz-modal [(nzVisible)]="confirmationCancelForm" 
    [nzContent]="cancelModalContent" [nzFooter]="cancelModalFooter"
    nzWrapClassName="vertical-center-modal"  [nzClosable]="false"
    [nzMaskClosable]="false" >
    <!-- <ng-template #confirmationModalHeader>
        <div nz-row nzGutter="8">
            <div nz-col nzSpan="24" class="gutter-row text-center">
                <span class="color-brand-primary">
                    Repeating Shift
                </span>
            </div>
        </div>
    </ng-template> -->
    <ng-template #cancelModalContent>
        <p>
            You have unsaved data filled in the form, are you sure you want to cancel?
        </p>
    </ng-template>
    <ng-template #cancelModalFooter>
        <button _ngcontent-jfp-c14="" (click)="cancelFormCancel()" nz-button="" nztype="default"
                 class="ant-btn btn-custom-light pop-btn-outline" nz-wave="[object Object]">
                <span>No</span>
            </button>
            <button _ngcontent-jfp-c14="" (click)="cancelConfirm()" nz-button="" nztype="default"
                class="ant-btn btn-custom-light pop-btn-fill" nz-wave="[object Object]">
                <span>Yes</span>
            </button>
        
    </ng-template>
</nz-modal>
<nz-modal [(nzVisible)]="showResetConfirmationAlert" 
    [nzContent]="resetModalContent" [nzFooter]="resetModalFooter"
    nzWrapClassName="vertical-center-modal" [nzClosable]="false"
    [nzMaskClosable]="false" >
    <!-- <ng-template #confirmationModalHeader>
        <div nz-row nzGutter="8">
            <div nz-col nzSpan="24" class="gutter-row text-center">
                <span class="color-brand-primary">
                    Repeating Shift
                </span>
            </div>
        </div>
    </ng-template> -->
    <ng-template #resetModalContent>
        <p>
            Are you sure you want to reset the form; you will lose the data you filled in?
        </p>
    </ng-template>
    <ng-template #resetModalFooter>
        <button _ngcontent-jfp-c14="" (click)="showResetConfirmationAlert=false;" nz-button="" nztype="default"
                 class="ant-btn btn-custom-light pop-btn-outline" nz-wave="[object Object]">
                <span>No</span>
            </button>
            <button _ngcontent-jfp-c14="" (click)="showResetConfirmationAlert=false;resetFormConfirm()" nz-button="" nztype="default"
                class="ant-btn btn-custom-light pop-btn-fill" nz-wave="[object Object]">
                <span>Yes</span>
            </button>
        
    </ng-template>
</nz-modal>

</div>
