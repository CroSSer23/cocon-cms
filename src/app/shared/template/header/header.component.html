<div class="header">
    <div class="logo logo-dark" style="display: flex; justify-content: center; align-items: center;">

        <a *ngIf="!isOrgLogin" href="">
            <img src="assets/images/logo/logo-with-text.svg" alt="Logo" style="width: 80%;">
            <img class="logo-fold" src="assets/images/logo/logo.svg" alt="Logo" style="width: 80%;">
            <!-- <img src="assets/images/logo/logo3.png" alt="Logo" style="margin:4px">
                <img class="logo-fold" src="assets/images/logo/logo-fold-3.png" alt="Logo"
                    style="margin: 0 auto;margin-top: 7px;"> -->
        </a>
        <a *ngIf="isOrgLogin && ImagePath" href="">
            <img [src]="ImageUrl" alt="Logo" style="width: 80%;">
            <img class="logo-fold" [src]="ImageUrl" alt="Logo" style="width: 80%;">
            <!-- <img src="assets/images/logo/logo3.png" alt="Logo" style="margin:4px">
                <img class="logo-fold" src="assets/images/logo/logo-fold-3.png" alt="Logo"
                    style="margin: 0 auto;margin-top: 7px;"> -->
        </a>
        <a *ngIf="isOrgLogin && !ImagePath" href="">
            <nz-avatar [ngStyle]="{ 'background-color': '#A1887C' }" [nzText]="adminNameText.charAt(0).toUpperCase()"
                style="margin-right: 10px; font-family:Poppins !important;" nzSize="medium"></nz-avatar>
        </a>
        

    </div>
    <div class="logo logo-white">
        <a href="">
            <img src="assets/images/logo/logo-white.png" alt="Logo">
            <img class="logo-fold" src="assets/images/logo/logo-fold-white.png" alt="Logo">
        </a>
    </div>
    <div class="nav-wrap">
        <ul class="nav-left">
            <li class="desktop-toggle">
                <a (click)="toggleFold()">
                    <i nz-icon [nzType]="isFolded? 'menu-unfold':'menu-fold'" theme="outline"></i>
                </a>
            </li>
            <li class="mobile-toggle">
                <a (click)="toggleExpand()">
                    <i nz-icon [nzType]="isExpand? 'menu-fold': 'menu-unfold'" theme="outline"></i>
                </a>
            </li>
            <li>
                <p class="m-b-0 text-dark font-weight-semibold font-small-caps"
                    *ngIf="breadcrumbs$ | async; let breadcrumbs" style="font-size: 20px;margin-left: 20px;">
                    {{(breadcrumbs[breadcrumbs.length - 1].label)}}</p>
            </li>
        </ul>
        <ul class="nav-right">
            <li *ngIf="isOrgLogin">
                <div style="display:table!important" class="d-flex m-r-5">
                    
                    <a style="font-family: Poppins !important; font-weight: 600; color: #2a2a2a !important;" href="tel:+31 6 123 19 390"> <i nz-icon nzType="phone" nzTheme="outline"></i>&nbsp;+31 6 123 19 390&nbsp;</a>
                </div>
                
               
            </li>
            <li>
                <div style="display:table!important" class="d-flex m-r-5">
                    
                    <span *ngIf="profileImagePath!=null && profileImagePath!=''">
                        <nz-avatar  [nzSrc]="profileImagePath"></nz-avatar>
                    </span>
                    <span *ngIf="!profileImagePath">
                        <nz-avatar [nzText]="profiletext" [ngStyle]="{ 'background-color': '#A1887C' }"></nz-avatar>
                    </span>
                    
                    
                    <div style="display: table-cell;vertical-align: middle;padding-left:10px;" class="m-l-10">
                        <p class="m-b-0 text-dark font-weight-semibold font-16 font-small-caps">{{this.adminName}}</p>
                    </div>
                    <span class="p-h-10 pointer" nz-dropdown [nzDropdownMenu]="profile" [nzTrigger]="'click'"
                        [nzPlacement]="'bottomRight'" style="position: relative;top: 3px;">
                        <i nz-icon nzType="caret-down" nzTheme="outline"></i>
                    </span>
                </div>
                <nz-dropdown-menu #profile="nzDropdownMenu">
                    <ul nz-menu class="p-b-15 p-t-20">
                        <li nz-menu-item>
                            <a class="p-v-5 d-flex align-items-center justify-content-between" (click)="logout()">
                                <div>
                                    <img src="assets/images/icons/logout.png" class="side-bar-img" />
                                    <span class="m-l-10 font-small-caps">Logout</span>
                                </div>
                                <!-- <i class="font-size-10" nz-icon nzType="right" theme="outline"></i> -->
                            </a>
                        </li>
                    </ul>
                </nz-dropdown-menu>

            </li>
            <!-- <li>
                <a (click)="quickViewToggle()">
                    <i nz-icon nzType="appstore" theme="outline"></i>
                </a>
                <nz-drawer [nzWidth]="280" nzTitle="Theme Config" [nzClosable]="false" [nzVisible]="quickViewVisible" nzPlacement="right" (nzOnClose)="quickViewToggle()">
                    <app-quick-view></app-quick-view>
                </nz-drawer>
            </li> -->
        </ul>
    </div>
</div>
