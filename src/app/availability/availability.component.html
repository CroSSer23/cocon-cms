<!-- Toast -->
<ng2-toasty [position]="'top-right'"></ng2-toasty>

<div class="font-poppins">
<!-- Default view: show booking table -->


<nz-card  >
    <div nz-row nzGutter="16">
        <div nz-col class="gutter-row" nzSpan="24" style="text-align: right;width:100%;height:20px">
            <a title="Cancel"  style="float: right;margin-bottom: 20px; color: #a1887c"><i
                    nz-icon nzType="close" theme="outline"></i></a>
        </div>
    </div>
    <!-- General details -->
    <form [formGroup]="availabilityForm" _ngcontent-jfp-c14="" novalidate="" nz-form=""
        class="ant-form ng-untouched ng-invalid ng-dirty ant-form-horizontal p-l-20 availabilityform">
        <div nz-col class="gutter-row" nzSpan="24" >
            <div nz-row nzGutterss="3" style="position: absolute;">
            <nz-form-item class="ant-form-item ant-row">
                <div nz-row nzGutter="16">
                    <div nz-col class="gutter-row" nzSpan="16">
                        <nz-form-label _ngcontent-jfp-c14="" class="ant-form-item-label">
                            <label>Appointment Date</label>
                        </nz-form-label>
                    </div>
                    
                </div>
                <div nz-row nzGutter="16">
                    <div nz-col class="gutter-row" nzSpan="16">
                        <nz-form-control _ngcontent-jfp-c14=""
                            class="ng-tns-c16-67 ant-form-item-control-wrapper ng-star-inserted ant-col-24">
                            <div class="ant-form-item-control">
                                <span class="ant-form-item-children">
                            <nz-date-picker id="bookingDate"
                                nzFormat="dd-MM-yyy"
                                nzAllowClear="false" nzPlaceHolder="Select Appointment Date"
                                formControlName="BookingDate" name="BookingDate"  class="form-control-font">
                            </nz-date-picker>
                                    <span class="ant-form-item-children-icon">
                                    </span>
                                </span>
                            </div>
                        </nz-form-control>
                    </div>
                    
                </div>
            </nz-form-item>
            </div>
            
        <div formArrayName="Products" id="Products">
            <div *ngFor="let alias of Products.controls; let i=index">
                <div [formGroupName]="i"> 
                    
                    <div nz-row nzGutterss="16">
                        
                            <nz-form-item class="ant-form-item ant-row">
                                <div nz-row nzGutter="16">
                                    <div nz-col class="gutter-row" nzSpan="3"  [ngStyle]="{'visibility': (i==0) ? 'hidden' : 'unset'}">
                                        <nz-form-label _ngcontent-jfp-c14="" class="ant-form-item-label">
                                            <label>Schedule 2nd Treatment</label>
                                        </nz-form-label>
                                    </div>
                                    <div nz-col class="gutter-row" nzSpan="1"></div>
                                    <div nz-col class="gutter-row" nzSpan="4">
                                        <nz-form-label _ngcontent-jfp-c14="" class="ant-form-item-label">
                                            <label>Treatment</label>
                                        </nz-form-label>
                                    </div>
                                    <div nz-col class="gutter-row" nzSpan="1"></div>
                                    <div nz-col class="gutter-row" nzSpan="4">
                                        <nz-form-label _ngcontent-jfp-c14="" class="ant-form-item-label">
                                            <label>Duration</label>
                                        </nz-form-label>
                                    </div>
                                    <div nz-col class="gutter-row" nzSpan="1"></div>
                                    <div nz-col class="gutter-row" nzSpan="7">
                                        <nz-form-label _ngcontent-jfp-c14="" class="ant-form-item-label">
                                            <label>Therapist Preference</label>
                                        </nz-form-label>
                                    </div>
                                    
                                </div>
                                <div nz-row nzGutter="16">
                                    <div nz-col class="gutter-row" nzSpan="3" [ngStyle]="{'visibility': (i==0) ? 'hidden' : 'unset'}">
                                        <nz-form-control _ngcontent-jfp-c14=""
                                            class="ng-tns-c16-67 ant-form-item-control-wrapper ng-star-inserted ant-col-24">
                                            <div class="ant-form-item-control">
                                                <span class="ant-form-item-children">
                                                    <nz-select formControlName="SameTime" [(ngModel)]="selectedValue" nzAllowClear                                                     [nzSize]="small">
                                                    <nz-option nzValue="0" nzLabel="Sametime"></nz-option>
                                                    <nz-option nzValue="1" nzLabel="Back to back"></nz-option>
                                                </nz-select>
                                                    <span class="ant-form-item-children-icon">
                                                    </span>
                                                </span>
                                            </div>
                                        </nz-form-control>
                                    </div>
                                    <div nz-col class="gutter-row" nzSpan="1"></div>
                                    <div nz-col class="gutter-row" nzSpan="4">
                                        <nz-form-control _ngcontent-jfp-c14=""
                                            class="ng-tns-c16-67 ant-form-item-control-wrapper ng-star-inserted ant-col-24">
                                            <div class="ant-form-item-control">
                                                <span class="ant-form-item-children">
                                                    <!-- <input _ngcontent-jfp-c14="" type="email" nz-input=""
                                                        formControlName="GoogleEmail" 
                                                        class="ant-input ng-untouched ng-pristine ng-invalid"> -->
                                                    <nz-select formControlName="ProductId" nzAllowClear nzPlaceHolder="Select Treatment"
                                                        [nzSize]="small">
                                                        <nz-option *ngFor="let treatment of alltreatment" [nzValue]="treatment.TreatmentId"
                                                            [nzLabel]="treatment.Name"></nz-option>
                                                    </nz-select>

                                                    <span class="ant-form-item-children-icon"></span>
                                                </span>
                                            </div>
                                        </nz-form-control>
                                    </div>
                                    <div nz-col class="gutter-row" nzSpan="1"></div>
                                    <div nz-col class="gutter-row" nzSpan="4">
                                        <nz-form-control _ngcontent-jfp-c14=""
                                            class="ng-tns-c16-67 ant-form-item-control-wrapper ng-star-inserted ant-col-24">
                                            <div class="ant-form-item-control">
                                                <span class="ant-form-item-children">
                                                    <!-- <input _ngcontent-jfp-c14="" type="email" nz-input=""
                                                        formControlName="GoogleEmail" 
                                                        class="ant-input ng-untouched ng-pristine ng-invalid"> -->
                                                    <nz-select formControlName="Duration" nzAllowClear nzPlaceHolder="Select Duration"
                                                        [nzSize]="small">
                                                        <nz-option *ngFor="let duration of allDurations" [nzValue]="duration.DurationId"
                                                            [nzLabel]="duration.Name"></nz-option>
                                                    </nz-select>

                                                    <span class="ant-form-item-children-icon"></span>
                                                </span>
                                            </div>
                                        </nz-form-control>
                                    </div>
                                    <div nz-col class="gutter-row" nzSpan="1"></div>
                                    <div nz-col class="gutter-row" nzSpan="7">
                                        <nz-form-control _ngcontent-jfp-c14=""
                                            class="ng-tns-c16-67 ant-form-item-control-wrapper ng-star-inserted ant-col-24">
                                            <div class="ant-form-item-control">
                                                <span class="ant-form-item-children">
                                                    <nz-radio-group [(ngModel)]="allPreference" [nzButtonStyle]="'solid'" formControlName="Preference">
                                                        <label nz-radio-button nzValue="0" class="font-10 font-semibold">Either</label>
                                                        <label nz-radio-button nzValue="1" class="font-10 font-semibold">Male</label>
                                                        <label nz-radio-button nzValue="2" class="font-10 font-semibold">Female</label>
                                                    </nz-radio-group>
                                                    <span class="ant-form-item-children-icon"></span>
                                                </span>
                                            </div>
                                        </nz-form-control>
                                    </div>
                                </div>
                            </nz-form-item>
                            
                        </div>
                    
                    </div>
                </div>
            </div>
        </div>
        
    </form>

    <div nz-col class="gutter-row" nzSpan="24" >
        <div nz-row nzGutterss="16" >

            <div nz-row nzGutter="16">
                <div nz-col class="gutter-row" nzSpan="19"  style="text-align: right;">
                <span class="font-10 font-semi-bold " nzTheme="outline" (click)="addProductControls()"
                style="text-align: right; color:#EE6D1D; cursor: pointer; ">Add New +..</span>
                </div></div>                
      </div>          
</div>
            

    <!-- Form footer with action buttons -->
    
    
        <div nz-col class="gutter-row" nzSpan="24">
            <button _ngcontent-jfp-c14=""  nz-button=""
                nztype="default" class="ant-btn ant-btn-default m-l-20 btn-fill" nz-wave="[object Object]">
                <span>Check Availability</span></button>
    
        
    </div>

    <nz-divider></nz-divider>

</nz-card>
</div>
